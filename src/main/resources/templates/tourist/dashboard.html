<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}">
    <title>Tourist Dashboard - GuideConnect</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 py-4">
    <div class="container">

        <!-- Welcome -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Welcome back, <span th:text="${user.displayName}">Traveler</span>!</h2>
            <a th:href="@{/tours}" class="btn btn-primary">
                <i class="bi bi-search"></i> Browse Tours
            </a>
        </div>

        <!-- Stats Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card text-center shadow-sm border-0">
                    <div class="card-body">
                        <div class="display-6 text-primary fw-bold" th:text="${bookings != null ? bookings.totalElements : 0}">0</div>
                        <p class="text-muted mb-0">Total Bookings</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center shadow-sm border-0">
                    <div class="card-body">
                        <div class="display-6 text-success fw-bold" th:text="${reviews != null ? reviews.totalElements : 0}">0</div>
                        <p class="text-muted mb-0">Reviews</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center shadow-sm border-0">
                    <div class="card-body">
                        <div class="display-6 text-warning fw-bold" th:text="${user.avgRating != null ? #numbers.formatDecimal(user.avgRating, 1, 1) : 'N/A'}">N/A</div>
                        <p class="text-muted mb-0">Avg Rating</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Upcoming Bookings -->
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white">
                <h5 class="mb-0">Upcoming Bookings</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" th:if="${bookings != null and bookings.totalElements > 0}">
                        <thead class="table-light">
                            <tr>
                                <th>Tour</th>
                                <th>Date</th>
                                <th>Guide</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="booking : ${bookings.content}">
                                <td th:text="${booking.tour.title}">City Walking Tour</td>
                                <td th:text="${booking.requestedDate}">2026-04-01</td>
                                <td th:text="${booking.guide.displayName}">John Doe</td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${booking.status.name() == 'CONFIRMED' ? 'bg-success' :
                                                           (booking.status.name() == 'REQUESTED' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                          th:text="${booking.status}">CONFIRMED</span>
                                </td>
                                <td>
                                    <a th:href="@{/bookings/{id}(id=${booking.id})}"
                                       class="btn btn-sm btn-outline-primary">View Details</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="text-center text-muted py-4" th:if="${bookings == null or bookings.totalElements == 0}">
                    <i class="bi bi-calendar-x display-4 d-block mb-2"></i>
                    <p>No upcoming bookings. Time to plan your next adventure!</p>
                    <a th:href="@{/tours}" class="btn btn-primary">Browse Tours</a>
                </div>
            </div>
        </div>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
