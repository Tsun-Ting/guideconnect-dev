<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}">
    <title>My Profile - GuideConnect</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>My Profile</h2>
                    <a th:href="@{/tourist/dashboard}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Back to Dashboard
                    </a>
                </div>

                <!-- Success/Error Messages -->
                <div th:if="${success}" class="alert alert-success" role="alert">
                    <span th:text="${success}">Profile updated successfully.</span>
                </div>
                <div th:if="${error}" class="alert alert-danger" role="alert">
                    <span th:text="${error}">An error occurred.</span>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">

                        <!-- Average Rating (read-only) -->
                        <div class="mb-4 text-center">
                            <h5 class="text-muted">Average Rating</h5>
                            <div class="display-5 text-warning fw-bold">
                                <i class="bi bi-star-fill"></i>
                                <span th:text="${user.avgRating != null ? #numbers.formatDecimal(user.avgRating, 1, 1) : 'N/A'}">4.5</span>
                            </div>
                        </div>

                        <hr/>

                        <form th:action="@{/tourist/profile}" method="post" th:object="${user}">
                            <div class="mb-3">
                                <label for="displayName" class="form-label">Display Name</label>
                                <input type="text" class="form-control" id="displayName"
                                       th:field="*{displayName}" placeholder="How others will see you"/>
                            </div>

                            <div class="mb-3">
                                <label for="contactInfo" class="form-label">Contact Information</label>
                                <input type="text" class="form-control" id="contactInfo"
                                       th:field="*{contactInfo}" placeholder="Phone number or alternate email"/>
                            </div>

                            <div class="mb-4">
                                <label for="languagePreferences" class="form-label">Language Preferences</label>
                                <input type="text" class="form-control" id="languagePreferences"
                                       th:field="*{languagePreferences}"
                                       placeholder="e.g., English, Spanish, French"/>
                                <div class="form-text">Comma-separated list of languages you speak.</div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Save Profile</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
