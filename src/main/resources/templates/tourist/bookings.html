<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}">
    <title>My Bookings - GuideConnect</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1">My Bookings</h2>
                <p class="text-muted mb-0">View your booking history and current trip requests.</p>
            </div>
            <a th:href="@{/tourist/dashboard}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">Booking History</h4>
                    <span class="text-muted small"
                          th:text="${bookingHistory != null ? bookingHistory.totalElements + ' bookings' : '0 bookings'}">0 bookings</span>
                </div>

                <div th:if="${bookingHistory == null or bookingHistory.totalElements == 0}" class="text-center py-4">
                    <p class="text-muted mb-0">You have not made any bookings yet.</p>
                </div>

                <div th:if="${bookingHistory != null and bookingHistory.totalElements > 0}" class="table-responsive">
                    <table class="table table-striped align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Tour</th>
                            <th>Scheduled Date</th>
                            <th>Status</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="booking : ${bookingHistory.content}">
                            <td th:text="${booking.tour.title}">Tour Title</td>
                            <td th:text="${#temporals.format(booking.requestedDate, 'MMM dd, yyyy')}">Jan 01, 2026</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${booking.status.name() == 'CONFIRMED' ? 'bg-success' :
                                                        booking.status.name() == 'NEGOTIATING' ? 'bg-warning text-dark' :
                                                        booking.status.name() == 'REQUESTED' ? 'bg-info' :
                                                        booking.status.name() == 'COMPLETED' ? 'bg-secondary' : 'bg-danger'}"
                                      th:text="${booking.status}">CONFIRMED</span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/bookings/{id}(id=${booking.id})}" class="btn btn-sm btn-outline-primary">
                                    View
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
