<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}">
    <title>Tour Form - GuideConnect</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow-1 py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 th:text="${tour.id != null ? 'Edit Tour' : 'Create New Tour'}">Create New Tour</h2>
                    <a th:href="@{/guide/dashboard}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Back to Dashboard
                    </a>
                </div>

                <!-- Success/Error Messages -->
                <div th:if="${success}" class="alert alert-success" role="alert">
                    <span th:text="${success}">Tour saved successfully.</span>
                </div>
                <div th:if="${error}" class="alert alert-danger" role="alert">
                    <span th:text="${error}">An error occurred.</span>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form th:action="${tour.id != null ? '/guide/tours/' + tour.id : '/guide/tours'}"
                              method="post" th:object="${tour}">

                            <h5 class="mb-3 text-muted">Tour Details</h5>

                            <div class="mb-3">
                                <label for="title" class="form-label">Tour Title</label>
                                <input type="text" class="form-control" id="title" th:field="*{title}"
                                       placeholder="e.g., Hidden Gems of Old Town" required="required"/>
                            </div>

                            <div class="mb-3">
                                <label for="category" class="form-label">Category</label>
                                <select class="form-select" id="category" th:field="*{category}">
                                    <option value="">Select a category</option>
                                    <option value="WALKING">Walking Tour</option>
                                    <option value="FOOD">Food &amp; Drink</option>
                                    <option value="HISTORY">History &amp; Culture</option>
                                    <option value="ADVENTURE">Adventure</option>
                                    <option value="NIGHTLIFE">Nightlife</option>
                                    <option value="ART">Art &amp; Architecture</option>
                                    <option value="NATURE">Nature &amp; Parks</option>
                                    <option value="PHOTOGRAPHY">Photography</option>
                                    <option value="OTHER">Other</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" th:field="*{description}"
                                          rows="5" required="required"
                                          placeholder="Describe what tourists will experience on this tour..."></textarea>
                            </div>

                            <hr class="my-4"/>
                            <h5 class="mb-3 text-muted">Location</h5>

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label for="city" class="form-label">City</label>
                                    <input type="text" class="form-control" id="city" th:field="*{city}"
                                           placeholder="e.g., Barcelona" required="required"/>
                                </div>
                                <div class="col-md-6">
                                    <label for="meetingLocation" class="form-label">Meeting Location</label>
                                    <input type="text" class="form-control" id="meetingLocation"
                                           th:field="*{meetingLocation}"
                                           placeholder="e.g., In front of the Cathedral"/>
                                </div>
                            </div>

                            <hr class="my-4"/>
                            <h5 class="mb-3 text-muted">Pricing &amp; Capacity</h5>

                            <div class="row g-3 mb-3">
                                <div class="col-md-4">
                                    <label for="durationHours" class="form-label">Duration (hours)</label>
                                    <input type="number" class="form-control" id="durationHours" th:field="*{durationHours}"
                                           min="1" max="24" step="1" required="required"
                                           placeholder="e.g., 3"/>
                                </div>
                                <div class="col-md-4">
                                    <label for="pricePerPerson" class="form-label">Price per Person ($)</label>
                                    <input type="number" class="form-control" id="pricePerPerson"
                                           th:field="*{pricePerPerson}"
                                           min="0" step="0.01" required="required"
                                           placeholder="e.g., 50.00"/>
                                </div>
                                <div class="col-md-4">
                                    <label for="maxGroupSize" class="form-label">Max Group Size</label>
                                    <input type="number" class="form-control" id="maxGroupSize"
                                           th:field="*{maxGroupSize}"
                                           min="1" max="50" required="required"
                                           placeholder="e.g., 8"/>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="languages" class="form-label">Languages Offered</label>
                                <input type="text" class="form-control" id="languages"
                                       th:field="*{languages}"
                                       placeholder="e.g., English, Spanish"/>
                                <div class="form-text">Comma-separated list of languages this tour is offered in.</div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
                                    <i class="bi bi-check-lg"></i>
                                    <span th:text="${tour.id != null ? 'Save Changes' : 'Publish Tour'}">Publish Tour</span>
                                </button>
                                <a th:href="@{/guide/dashboard}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
