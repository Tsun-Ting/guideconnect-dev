<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<footer th:fragment="footer" class="bg-dark text-light py-4 mt-auto">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h5>GuideConnect</h5>
                <p class="text-muted">Explore cities like a local friend.</p>
            </div>
            <div class="col-md-3">
                <h6>Links</h6>
                <ul class="list-unstyled">
                    <li><a th:href="@{/tours}" class="text-muted text-decoration-none">Browse Tours</a></li>
                    <li><a th:href="@{/about}" class="text-muted text-decoration-none">About Us</a></li>
                    <li><a th:href="@{/contact}" class="text-muted text-decoration-none">Contact</a></li>
                </ul>
            </div>
            <div class="col-md-3">
                <h6>Support</h6>
                <ul class="list-unstyled">
                    <li><a th:href="@{/faq}" class="text-muted text-decoration-none">FAQ</a></li>
                    <li><a th:href="@{/terms}" class="text-muted text-decoration-none">Terms of Service</a></li>
                    <li><a th:href="@{/privacy}" class="text-muted text-decoration-none">Privacy Policy</a></li>
                </ul>
            </div>
        </div>
        <hr class="border-secondary"/>
        <div class="text-center text-muted">
            <small>&copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> GuideConnect. All rights reserved.</small>
        </div>
    </div>
</footer>
</body>
</html>
