<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}">
    <title>Search Tours - GuideConnect</title>
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>

<div class="container my-4">
    <h2 class="mb-4">Search Tours</h2>

    <!-- Filter Bar -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/tours/search}" method="get">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label for="city" class="form-label">City</label>
                        <input type="text" class="form-control" id="city" name="city"
                               th:value="${param.city}" placeholder="e.g. Bangkok"/>
                    </div>
                    <div class="col-md-2">
                        <label for="language" class="form-label">Language</label>
                        <select class="form-select" id="language" name="language">
                            <option value="">Any Language</option>
                            <option value="English" th:selected="${param.language == 'English'}">English</option>
                            <option value="Spanish" th:selected="${param.language == 'Spanish'}">Spanish</option>
                            <option value="French" th:selected="${param.language == 'French'}">French</option>
                            <option value="German" th:selected="${param.language == 'German'}">German</option>
                            <option value="Japanese" th:selected="${param.language == 'Japanese'}">Japanese</option>
                            <option value="Chinese" th:selected="${param.language == 'Chinese'}">Chinese</option>
                            <option value="Thai" th:selected="${param.language == 'Thai'}">Thai</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="minPrice" class="form-label">Min Price ($)</label>
                        <input type="number" class="form-control" id="minPrice" name="minPrice"
                               th:value="${param.minPrice}" min="0" step="0.01" placeholder="0"/>
                    </div>
                    <div class="col-md-2">
                        <label for="maxPrice" class="form-label">Max Price ($)</label>
                        <input type="number" class="form-control" id="maxPrice" name="maxPrice"
                               th:value="${param.maxPrice}" min="0" step="0.01" placeholder="500"/>
                    </div>
                    <div class="col-md-2">
                        <label for="sort" class="form-label">Sort By</label>
                        <select class="form-select" id="sort" name="sort">
                            <option value="relevance" th:selected="${param.sort == 'relevance'}">Relevance</option>
                            <option value="price_low" th:selected="${param.sort == 'price_low'}">Price: Low to High</option>
                            <option value="price_high" th:selected="${param.sort == 'price_high'}">Price: High to Low</option>
                            <option value="rating" th:selected="${param.sort == 'rating'}">Rating</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-search"></i> Filter
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Results Count -->
    <p class="text-muted mb-3" th:if="${tours != null}">
        <strong th:text="${tours.totalElements}">14</strong> tours found
        <span th:if="${param.city != null and !param.city.isEmpty()}"
              th:text="' in ' + ${param.city}"></span>
    </p>

    <!-- Tour Cards Grid -->
    <div class="row g-4" th:if="${tours != null and tours.totalElements > 0}">
        <div class="col-md-6 col-lg-4" th:each="tour : ${tours.content}">
            <div class="card h-100 shadow-sm">
                <div class="bg-secondary text-white d-flex align-items-center justify-content-center"
                     style="height: 200px;">
                    <i class="bi bi-image" style="font-size: 3rem;"></i>
                </div>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${tour.title}">Tour Title</h5>
                    <p class="card-text text-muted small"
                       th:text="${#strings.abbreviate(tour.description, 120)}">
                        Tour description snippet goes here...
                    </p>
                    <div class="d-flex align-items-center mb-2">
                        <i class="bi bi-person-circle me-1 text-primary"></i>
                        <span class="small" th:text="${tour.guide.displayName}">Guide Name</span>
                        <span class="ms-2 small text-warning" th:if="${tour.guide.avgRating > 0}">
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${#numbers.formatDecimal(tour.guide.avgRating, 1, 1)}">4.5</span>
                        </span>
                    </div>
                    <div class="mb-2">
                        <span class="badge bg-info me-1"
                              th:each="lang : ${#strings.arraySplit(tour.languages, ',')}"
                              th:text="${#strings.trim(lang)}">English</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-auto">
                        <div>
                            <span class="fw-bold text-primary"
                                  th:text="'$' + ${#numbers.formatDecimal(tour.pricePerPerson, 1, 2)}">$50.00</span>
                            <span class="text-muted small">/person</span>
                        </div>
                        <span class="text-muted small">
                            <i class="bi bi-clock"></i>
                            <span th:text="${tour.durationHours} + ' hrs'">3 hrs</span>
                        </span>
                    </div>
                </div>
                <div class="card-footer bg-white border-top-0">
                    <a th:href="@{/tours/{id}(id=${tour.id})}" class="btn btn-primary w-100">
                        Book Now
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- No Results -->
    <div class="text-center py-5" th:if="${tours == null or tours.totalElements == 0}">
        <i class="bi bi-search" style="font-size: 3rem;"></i>
        <p class="mt-3 text-muted">No tours found matching your criteria. Try adjusting your filters.</p>
    </div>

    <!-- Pagination -->
    <nav aria-label="Search results pages" class="mt-4" th:if="${tours != null and tours.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${tours.first ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/tours/search(page=${tours.number - 1}, city=${param.city}, language=${param.language}, minPrice=${param.minPrice}, maxPrice=${param.maxPrice}, sort=${param.sort})}">
                    Previous
                </a>
            </li>
            <li class="page-item" th:each="pageNum : ${#numbers.sequence(0, tours.totalPages - 1)}"
                th:classappend="${pageNum == tours.number ? 'active' : ''}">
                <a class="page-link"
                   th:href="@{/tours/search(page=${pageNum}, city=${param.city}, language=${param.language}, minPrice=${param.minPrice}, maxPrice=${param.maxPrice}, sort=${param.sort})}"
                   th:text="${pageNum + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${tours.last ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/tours/search(page=${tours.number + 1}, city=${param.city}, language=${param.language}, minPrice=${param.minPrice}, maxPrice=${param.maxPrice}, sort=${param.sort})}">
                    Next
                </a>
            </li>
        </ul>
    </nav>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
