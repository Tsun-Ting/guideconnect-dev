<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}">
    <title>Leave a Review - GuideConnect</title>
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h2 class="mb-4">Leave a Review</h2>

            <!-- Booking Summary -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 th:text="${booking.tour.title}">Tour Title</h5>
                    <div class="row text-muted small">
                        <div class="col-md-6">
                            <p class="mb-1">
                                <i class="bi bi-person-circle me-1"></i>
                                <span th:text="${revieweeName}">Guide/Tourist Name</span>
                            </p>
                        </div>
                        <div class="col-md-6">
                            <p class="mb-1">
                                <i class="bi bi-calendar3 me-1"></i>
                                <span th:text="${#temporals.format(booking.requestedDate, 'MMM dd, yyyy')}">Jan 01, 2026</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Review Form -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h4 class="mb-0">Your Review</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/reviews}" method="post" th:object="${review}">
                        <input type="hidden" th:name="bookingId" th:value="${booking.id}"/>

                        <!-- Star Rating -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Overall Rating</label>
                            <div class="star-rating d-flex gap-1" id="starRating">
                                <div th:each="i : ${#numbers.sequence(1, 5)}" class="form-check form-check-inline m-0">
                                    <input type="radio" class="btn-check" th:name="starRating"
                                           th:id="'star' + ${i}" th:value="${i}" required
                                           onchange="updateStarDisplay(this.value)"/>
                                    <label class="btn btn-outline-warning btn-lg p-1" th:for="'star' + ${i}"
                                           style="font-size: 2rem; line-height: 1; cursor: pointer;">
                                        <i class="bi bi-star" th:id="'starIcon' + ${i}"></i>
                                    </label>
                                </div>
                            </div>
                            <small class="text-muted" id="ratingText">Select a rating</small>
                        </div>

                        <!-- Written Review -->
                        <div class="mb-4">
                            <label for="comment" class="form-label fw-bold">Written Review</label>
                            <textarea class="form-control" id="comment" th:field="*{comment}"
                                      rows="5" maxlength="500"
                                      placeholder="Share your experience..."
                                      oninput="updateCharCount()"></textarea>
                            <div class="d-flex justify-content-end mt-1">
                                <small class="text-muted">
                                    <span id="charCount">0</span>/500 characters
                                </small>
                            </div>
                        </div>

                        <!-- Submit -->
                        <div class="d-flex justify-content-between align-items-center">
                            <a th:href="@{/bookings/{id}(id=${booking.id})}" class="btn btn-link text-muted">
                                <i class="bi bi-arrow-left"></i> Back to Booking
                            </a>
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-send"></i> Submit Review
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/header :: scripts}"></div>

<script>
    const ratingLabels = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];

    function updateStarDisplay(value) {
        for (let i = 1; i <= 5; i++) {
            const icon = document.getElementById('starIcon' + i);
            if (i <= value) {
                icon.className = 'bi bi-star-fill';
            } else {
                icon.className = 'bi bi-star';
            }
        }
        document.getElementById('ratingText').textContent = ratingLabels[value];
    }

    function updateCharCount() {
        const textarea = document.getElementById('comment');
        document.getElementById('charCount').textContent = textarea.value.length;
    }

    document.addEventListener('DOMContentLoaded', function() {
        updateCharCount();
    });
</script>
</body>
</html>
