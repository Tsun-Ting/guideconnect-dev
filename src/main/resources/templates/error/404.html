<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Page Not Found - GuideConnect</title>
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h1 class="display-1 fw-bold text-secondary">404</h1>
            <h3 class="mb-3">Page Not Found</h3>
            <p class="text-muted mb-4">
                The page you are looking for does not exist or has been moved. Please check the URL and try again.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a th:href="@{/}" class="btn btn-primary">
                    <i class="bi bi-house"></i> Go Home
                </a>
                <a th:href="@{/tours}" class="btn btn-outline-primary">
                    <i class="bi bi-search"></i> Browse Tours
                </a>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
