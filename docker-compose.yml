version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: guideconnect-db
    environment:
      POSTGRES_DB: guideconnect
      POSTGRES_USER: guideconnect
      POSTGRES_PASSWORD: guideconnect123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
