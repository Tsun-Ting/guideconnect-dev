<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
  <title>Messages - GuideConnect</title>
</head>
<body>
<nav th:replace="~{fragments/header :: header}"></nav>

<div class="container my-4">
  <h2 class="mb-4">My Messages</h2>

  <div th:if="${bookingsWithMessages.empty}" class="text-center py-5">
    <i class="bi bi-chat-dots display-3 text-muted d-block mb-3"></i>
    <h4 class="text-muted">No Messages Yet</h4>
    <p class="text-muted">Your booking conversations will appear here.</p>
  </div>

  <div class="card shadow-sm border-0 mb-3"
       th:each="booking : ${bookingsWithMessages}"
       th:classappend="${unreadCounts[booking.id] > 0 ? 'border-start border-primary border-3' : ''}">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <div class="d-flex align-items-center gap-2 mb-1">
            <h5 class="mb-0" th:text="${booking.tour.title}">Tour Title</h5>
            <!-- NEW badge for unread -->
            <span class="badge bg-danger"
                  th:if="${unreadCounts[booking.id] > 0}"
                  th:text="${unreadCounts[booking.id]} + ' new'">2 new</span>
          </div>
          <p class="text-muted mb-0">
            <span th:text="${booking.tourist.displayName}">Tourist</span>
            &amp;
            <span th:text="${booking.guide.displayName}">Guide</span>
          </p>
          <small class="text-muted">
            Booking #<span th:text="${booking.id}">123</span>
            <span class="badge ms-2"
                  th:classappend="${booking.status.name() == 'CONFIRMED' ? 'bg-success' :
                                          booking.status.name() == 'NEGOTIATING' ? 'bg-warning text-dark' :
                                          booking.status.name() == 'REQUESTED' ? 'bg-info' :
                                          booking.status.name() == 'COMPLETED' ? 'bg-secondary' : 'bg-danger'}"
                  th:text="${booking.status}">STATUS</span>
          </small>
        </div>
        <a th:href="@{/messages/booking/{id}(id=${booking.id})}"
           class="btn btn-outline-primary">
          <i class="bi bi-chat-left-text"></i> Open Chat
          <span class="badge bg-danger ms-1"
                th:if="${unreadCounts[booking.id] > 0}"
                th:text="${unreadCounts[booking.id]}">0</span>
        </a>
      </div>
    </div>
  </div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
