<script th:inline="javascript">
    const pricePerPerson = [[${tour.pricePerPerson}]];

    function calculateCost() {
        const groupSize = parseInt(document.getElementById('groupSize').value);
        const subtotal = pricePerPerson * groupSize;
        const fee = subtotal * 0.10;
        const total = subtotal + fee;

        document.getElementById('costGroupSize').textContent = groupSize;
        document.getElementById('tourSubtotal').textContent = '$' + subtotal.toFixed(2);
        document.getElementById('platformFee').textContent = '$' + fee.toFixed(2);
        document.getElementById('totalCost').textContent = '$' + total.toFixed(2);
    }

    document.addEventListener('DOMContentLoaded', calculateCost);
</script>
